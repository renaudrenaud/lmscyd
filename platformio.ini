; LMS CYD - Logitech Media Server display for ESP32 Cheap Yellow Display
; Board: ESP32-2432S028 (2.8" 320x240 TFT ILI9341 + XPT2046 touch)

[env:esp32-cyd]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    bblanchon/ArduinoJson @ ^7.3.1

board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
